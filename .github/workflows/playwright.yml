name: Playwright E2E

on:
  push:
    branches: [ feat/subscription-analysis, main ]
  pull_request:
    branches: [ feat/subscription-analysis, main ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start server
        run: |
          nohup node server.js > server.log 2>&1 &
          for i in {1..30}; do
            if curl -sSf http://localhost:3000/ > /dev/null; then
              echo server up; break
            fi
            sleep 1
          done

      - name: Run Playwright tests (JS-enabled + non-JS)
        run: |
          # Run both the JS-enabled and non-JS specs to validate progressive enhancement
          npx playwright test tests/e2e/sidebar.spec.js tests/e2e/sidebar-nonjs.spec.js -c tests/e2e/playwright.config.js --reporter=list

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
