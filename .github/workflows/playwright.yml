name: Playwright E2E

on:
  push:
    branches: [ feat/universal-menu, protocol-evolution-setup, main ]
  pull_request:
    branches: [ protocol-evolution-setup, main ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start server
        run: |
          nohup node server.js > server.log 2>&1 &
          for i in {1..30}; do
            if curl -sSf http://localhost:3000/ > /dev/null; then
              echo server up; break
            fi
            sleep 1
          done

      - name: Run Playwright tests (JS-enabled + non-JS)
        run: |
          # Default to the merged-menu spec; if you have a playwright.config.js in tests/e2e
          # the runner will pick it up automatically.
          npx playwright test tests/e2e/merged-menu.spec.js --reporter=list

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
