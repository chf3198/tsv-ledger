name: CI Instructions
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  schedule:
    - cron: 0 2 * * *
jobs:
  validate_instructions:
    name: Validate Instructions
    "runs-on": ubuntu-latest
    strategy:
      matrix:
        node_version:
          - 18.x
          - 20.x
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js ${{ matrix.node_version }}
        uses: actions/setup-node@v4
        with:
          "node-version": ${{ matrix.node_version }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run instruction validation
        run: "npm run validate:instructions"
      - name: Run code quality checks
        run: "npm run ci:quality"
      - name: Run integration tests
        run: "npm run ci:integration"
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.node_version }}
          path: test-results/
  performance_test:
    name: Performance Testing
    "runs-on": ubuntu-latest
    needs: validate_instructions
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          "node-version": 18.x
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run performance tests
        run: "npm run test:performance"
      - name: Upload performance results
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: performance-results/
  deploy_staging:
    name: Deploy to Staging
    "runs-on": ubuntu-latest
    needs:
      - validate_instructions
      - performance_test
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Deploy to staging
        run: echo "Deploying to staging environment..."
  deploy_production:
    name: Deploy to Production
    "runs-on": ubuntu-latest
    needs:
      - validate_instructions
      - performance_test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Deploy to production
        run: echo "Deploying to production environment..."
