<!doctype html>
<html>
  <head>
    <title>UX Testing Controller</title>
    <style>
      body {
        width: 300px;
        padding: 20px;
        font-family: Arial, sans-serif;
      }
      button {
        width: 100%;
        padding: 10px;
        margin: 5px 0;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover {
        background: #0056b3;
      }
      button:disabled {
        background: #ccc;
        cursor: not-allowed;
      }
      .status {
        margin-top: 10px;
        padding: 10px;
        border-radius: 4px;
        display: none;
      }
      .status.success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }
      .status.error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }
      .status.info {
        background: #d1ecf1;
        color: #0c5460;
        border: 1px solid #bee5eb;
      }
    </style>
  </head>
  <body>
    <h3>UX Testing Controller</h3>

    <button id="startTesting">Start UX Testing</button>
    <button id="testHamburger">Test Hamburger Menu</button>
    <button id="testNavigation">Test Navigation</button>
    <button id="testForms">Test Form Inputs</button>
    <button id="testScrolling">Test Scrolling</button>
    <button id="takeScreenshot">Take Screenshot</button>

    <div id="status" class="status"></div>

    <script src="popup.js"></script>
  </body>
</html>
