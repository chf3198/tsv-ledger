<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Navigation UX Testing Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.15.0/dist/themes/light.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; }
        .sidebar-drawer { --size: 280px; }
        .main-content { margin-left: 280px; padding: 2rem; padding-top: 100px; }
        #main-navigation { padding: 1rem 0; }
        #main-navigation a { color: rgba(255,255,255,0.8); padding: 0.75rem 1.5rem; display: flex; align-items: center; }
        #main-navigation a:hover { color: white; background: rgba(255,255,255,0.1); }
        #main-navigation a i { margin-right: 0.75rem; width: 20px; }

        /* Demo controls */
        .demo-controls { position: fixed; top: 20px; right: 20px; z-index: 1000; }
        .demo-controls button { margin: 5px; }
    </style>
</head>
<body>
    <!-- Demo Controls for Manual Testing -->
    <div class="demo-controls">
        <button id="open-sidebar" class="btn btn-success btn-sm">Open Sidebar</button>
        <button id="close-sidebar" class="btn btn-warning btn-sm">Close Sidebar</button>
        <button id="test-link-1" class="btn btn-info btn-sm">Test Link 1</button>
        <button id="test-link-2" class="btn btn-info btn-sm">Test Link 2</button>
    </div>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">TSV Ledger</a>
            <button id="nav-toggle" class="btn btn-outline-light ms-3">
                <i class="fas fa-bars"></i> Toggle Menu
            </button>
        </div>
    </nav>

    <sl-drawer id="sidebar" placement="start" class="sidebar-drawer" no-header>
        <nav class="nav nav-pills flex-column p-3" id="main-navigation">
            <!-- Navigation items will be populated by JavaScript -->
        </nav>
    </sl-drawer>

    <main class="main-content">
        <h1>🤖 AI Navigation UX Testing Demo</h1>
        <div class="alert alert-info">
            <strong>Watch the AI test your navigation!</strong> The browser will automatically demonstrate:
            <ul>
                <li>Navigation menu loading</li>
                <li>Sidebar open/close functionality</li>
                <li>Menu link interactions</li>
                <li>Visual styling verification</li>
            </ul>
        </div>

        <div id="test-results" class="mt-4">
            <!-- Test results will appear here -->
        </div>
    </main>

    <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.15.0/dist/shoelace.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Mock menu data
        const mockMenuData = [
            { href: "#", text: "Dashboard", icon: "fas fa-tachometer-alt", dataSection: "dashboard" },
            { href: "#", text: "Bank Reconciliation", icon: "fas fa-balance-scale", dataSection: "bank-reconciliation" },
            { href: "#", text: "Subscription Analysis", icon: "fas fa-link", dataSection: "subscription-analysis" },
            { href: "#", text: "Benefits Management", icon: "fas fa-users", dataSection: "benefits-management" },
            { href: "#", text: "Geographic Analysis", icon: "fas fa-map-marked-alt", dataSection: "geographic-analysis" }
        ];

        // Navigation renderer
        function renderNavigation(items) {
            const container = document.getElementById("main-navigation");
            if (!container) {
                console.error("Navigation container not found");
                return;
            }
            container.innerHTML = "";

            items.forEach((item) => {
                const a = document.createElement("a");
                a.className = "nav-link d-flex align-items-center";
                a.href = item.href || "#";
                if (item.dataSection) a.setAttribute("data-section", item.dataSection);
                a.innerHTML = `<i class="${item.icon} me-2"></i><span>${item.text}</span>`;
                a.addEventListener("click", (e) => {
                    if (item.dataSection) {
                        e.preventDefault();
                        showSection(item.dataSection);
                    }
                });
                container.appendChild(a);
            });
        }

        function showSection(sectionId) {
            const results = document.getElementById('test-results');
            results.innerHTML += `<div class="alert alert-success mt-2">✅ Navigated to: ${sectionId}</div>`;
            console.log(`Navigation: ${sectionId}`);
        }

        function logAction(action) {
            const results = document.getElementById('test-results');
            results.innerHTML += `<div class="alert alert-info mt-2">🔧 ${action}</div>`;
            console.log(action);
        }

        // Manual demo controls
        document.addEventListener('DOMContentLoaded', () => {
            console.log('🔧 Initializing navigation demo...');

            // Setup manual controls
            document.getElementById('open-sidebar').addEventListener('click', () => {
                const drawer = document.getElementById('sidebar');
                if (drawer && typeof drawer.show === 'function') {
                    drawer.show();
                    logAction('Manual: Sidebar opened');
                }
            });

            document.getElementById('close-sidebar').addEventListener('click', () => {
                const drawer = document.getElementById('sidebar');
                if (drawer && typeof drawer.hide === 'function') {
                    drawer.hide();
                    logAction('Manual: Sidebar closed');
                }
            });

            document.getElementById('nav-toggle').addEventListener('click', () => {
                const drawer = document.getElementById('sidebar');
                if (drawer) {
                    if (drawer.open) {
                        drawer.hide();
                        logAction('Toggle: Sidebar closed');
                    } else {
                        drawer.show();
                        logAction('Toggle: Sidebar opened');
                    }
                }
            });

            document.getElementById('test-link-1').addEventListener('click', () => {
                const links = document.querySelectorAll('#main-navigation a');
                if (links[0]) {
                    links[0].click();
                    logAction('Manual: Clicked first navigation link');
                }
            });

            document.getElementById('test-link-2').addEventListener('click', () => {
                const links = document.querySelectorAll('#main-navigation a');
                if (links[1]) {
                    links[1].click();
                    logAction('Manual: Clicked second navigation link');
                }
            });

            // Initialize navigation
            renderNavigation(mockMenuData);
            logAction('Navigation menu initialized with 5 links');

            console.log('✅ Navigation demo initialized');
        });

        // Expose functions for AI testing
        window.aiTestSidebar = function(action) {
            const drawer = document.getElementById('sidebar');
            if (drawer) {
                if (action === 'open' && typeof drawer.show === 'function') {
                    drawer.show();
                    logAction('AI: Sidebar opened');
                    return true;
                } else if (action === 'close' && typeof drawer.hide === 'function') {
                    drawer.hide();
                    logAction('AI: Sidebar closed');
                    return true;
                }
            }
            return false;
        };

        window.aiTestNavigation = function(linkIndex) {
            const links = document.querySelectorAll('#main-navigation a');
            if (links[linkIndex]) {
                links[linkIndex].click();
                logAction(`AI: Clicked navigation link ${linkIndex + 1}`);
                return true;
            }
            return false;
        };
    </script>
</body>
</html>
