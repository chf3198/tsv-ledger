<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Analysis Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; }
        .main-content { padding: 2rem; padding-top: 80px; }
        .feature-card { height: 100%; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">TSV Ledger</a>
        </div>
    </nav>

    <main class="main-content">
        <div class="row">
            <div class="col-md-6">
                <div class="card feature-card">
                    <div class="card-body">
                        <h5 class="card-title">Quick Analysis</h5>
                        <p class="card-text">Get instant insights into your expense data.</p>
                        <button id="quick-analysis-btn" class="btn btn-primary">Load Analysis</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="analysis-results" class="mt-4">
            <!-- Analysis results will appear here -->
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const btn = document.getElementById('quick-analysis-btn');
            const results = document.getElementById('analysis-results');

            btn.addEventListener('click', () => {
                // Simulate analysis loading
                results.innerHTML = `
                    <div class="card">
                        <div class="card-body">
                            <h6>Analysis Results</h6>
                            <p>Total expenses: $1,250.00</p>
                            <p>Categories: 8</p>
                            <p>Largest category: Office Supplies (35%)</p>
                        </div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
