<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benefits Allocation Fix Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 20px; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background-color: #d4edda; border: 1px solid #c3e6cb; color: #155724; }
        .failure { background-color: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Benefits Allocation Fix Test</h1>
        <p>This page tests that items with 0% allocation don't appear in wrong columns.</p>

        <button id="testBtn" class="btn btn-primary">Run Test</button>
        <div id="results"></div>
    </div>

    <script>
        document.getElementById('testBtn').addEventListener('click', async () => {
            const results = document.getElementById('results');
            results.innerHTML = '<div class="alert alert-info">Testing...</div>';

            try {
                // Open main window
                const mainWindow = window.open('http://localhost:3000/employee-benefits.html', '_blank');

                // Wait for it to load
                await new Promise(resolve => setTimeout(resolve, 3000));

                // Try to open modal and test
                mainWindow.postMessage({ type: 'TEST_BENEFITS_FIX' }, '*');

                // Listen for results
                window.addEventListener('message', (event) => {
                    if (event.data.type === 'TEST_RESULT') {
                        const resultDiv = document.createElement('div');
                        resultDiv.className = `test-result ${event.data.success ? 'success' : 'failure'}`;
                        resultDiv.innerHTML = `
                            <h4>${event.data.success ? '✅ PASS' : '❌ FAIL'}</h4>
                            <p>${event.data.message}</p>
                            <details>
                                <summary>Details</summary>
                                <pre>${JSON.stringify(event.data.details, null, 2)}</pre>
                            </details>
                        `;
                        results.appendChild(resultDiv);
                    }
                });

            } catch (error) {
                results.innerHTML = `<div class="test-result failure"><h4>❌ Error</h4><p>${error.message}</p></div>`;
            }
        });
    </script>
</body>
</html>
