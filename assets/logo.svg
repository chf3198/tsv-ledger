<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d9a5"/>
      <stop offset="100%" style="stop-color:#00f5c4"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)"/>
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#accentGrad)" stroke-width="8"/>

  <!-- Ledger icon -->
  <g transform="translate(136, 136)">
    <!-- Outer frame -->
    <rect x="0" y="0" width="240" height="240" rx="24" fill="none" stroke="#ffffff" stroke-width="6" opacity="0.9"/>

    <!-- Vertical divider -->
    <line x1="80" y1="24" x2="80" y2="216" stroke="#ffffff" stroke-width="4" opacity="0.4"/>

    <!-- Horizontal lines -->
    <line x1="24" y1="72" x2="216" y2="72" stroke="#ffffff" stroke-width="3" opacity="0.4"/>
    <line x1="24" y1="120" x2="216" y2="120" stroke="#ffffff" stroke-width="3" opacity="0.4"/>
    <line x1="24" y1="168" x2="216" y2="168" stroke="#ffffff" stroke-width="3" opacity="0.4"/>

    <!-- Header bar -->
    <rect x="24" y="24" width="192" height="36" rx="8" fill="url(#accentGrad)" opacity="0.6"/>

    <!-- Checkmarks -->
    <g stroke="url(#greenGrad)" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M36 90 L48 102 L68 78"/>
      <path d="M36 138 L48 150 L68 126"/>
      <path d="M36 186 L48 198 L68 174"/>
    </g>

    <!-- Dollar amounts (represented as bars) -->
    <rect x="100" y="84" width="100" height="12" rx="6" fill="#ffffff" opacity="0.6"/>
    <rect x="100" y="132" width="80" height="12" rx="6" fill="#ffffff" opacity="0.6"/>
    <rect x="100" y="180" width="60" height="12" rx="6" fill="#ffffff" opacity="0.6"/>
  </g>
</svg>
