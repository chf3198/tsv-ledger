<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#bgGrad)"/>

  <!-- Simplified ledger -->
  <rect x="6" y="6" width="20" height="20" rx="3" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.9"/>

  <!-- Header -->
  <rect x="8" y="8" width="16" height="4" rx="1" fill="url(#accentGrad)" opacity="0.7"/>

  <!-- Lines -->
  <line x1="8" y1="15" x2="24" y2="15" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <line x1="8" y1="19" x2="24" y2="19" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <line x1="8" y1="23" x2="24" y2="23" stroke="#ffffff" stroke-width="1" opacity="0.3"/>

  <!-- Checkmarks -->
  <g stroke="#00d9a5" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M9 15 L10 16 L12 14"/>
    <path d="M9 19 L10 20 L12 18"/>
    <path d="M9 23 L10 24 L12 22"/>
  </g>
</svg>
